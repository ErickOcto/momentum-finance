version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: momentum-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: momentum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d momentum"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: momentum-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/momentum?sslmode=disable"
      CLERK_JWKS_URL: "https://api.clerk.com/v1/jwks"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
